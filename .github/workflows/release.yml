name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ubuntu-latest-go-1.22-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ubuntu-latest-go-1.22-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v ./...

    - name: Run benchmarks
      run: go test -bench=. -benchmem -run=^$ ./...

    - name: Generate coverage report
      run: go test -coverprofile=coverage.out -covermode=atomic ./...

    - name: Create release archives
      run: |
        # Create version string from tag
        VERSION=${GITHUB_REF#refs/tags/}

        # Create release directory
        mkdir -p release

        # Generate documentation
        go doc -all > release/doc.txt

        # Create coverage HTML
        go tool cover -html=coverage.out -o release/coverage.html

        # Copy important files
        cp coverage.out release/
        cp README.md release/
        cp LICENSE release/
        cp go.mod release/
        cp go.sum release/

        # Create tarball
        tar -czf release/float-${VERSION}.tar.gz release/

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## Changes

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ## Installation

          ```bash
          go get github.com/jenska/float@${{ github.ref }}
          ```
        draft: false
        prerelease: false

    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release/float-${{ github.ref }}.tar.gz
        asset_name: float-${{ github.ref }}.tar.gz
        asset_content_type: application/gzip